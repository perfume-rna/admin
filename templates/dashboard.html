<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/sql-wasm.js"></script>
</head>
<body>
    <h1 style="color: white; text-align: center;">Admin Dashboard</h1>

    <div id="product_details_container">
        <table id="product_details_table">
            <tr id="product_details_table_header">
                <td>Number</td>
                <td>Name</td>
                <td>Quantity</td>
                <td>Price</td>
                <td>Link</td>
                <td>Description</td>
            </tr>
        </table>

        <br>
        <button id="add_product_btn" onclick="new_product_form()">Add</button>
    </div>

    <div id="screen">
        <div class="form-container">
            <h2>Product Update</h2>
            <form id="form_update_product">
                <label>Product Name</label>
                <input type="text" placeholder="Product name" id="product_name_up" required>
                <br>
                <label>Quantity</label>
                <input type="number" placeholder="Product quantity" id="product_qty_up" required>
                <br>
                <label>Price</label>
                <input type="number" placeholder="Product price" id="product_price_up" required>
                <br>
                <label>Image link</label>
                <input type="text" placeholder="Product image link" id="product_img_up" required>
                <br>
                <label>Description</label>
                <br>
                <textarea placeholder="Product description" id="product_dsc_up" required></textarea>
                <button id="back_button_pu" type="button" onclick="close_form()">Back</button>
                <button id="delete_button_pu" type="button" onclick="update_product_send('delete')">Delete</button>
                <button type="button" id="update_submit">Submit</button>
            </form>
        </div>
    </div>

    <div id="loading_container">
          <div id="loading">
           <img src="https://media1.tenor.com/m/Pq1cZiuhlEEAAAAC/rajinikanth.gif" alt="loading" />
           <p>Loading ...</p>
          </div>
    </div>

    <div id="failed_container">
       <div id="failed">
             <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSL2pcBiB5mWS_hJxDZQEvBMNsakG3P4GygTQ&s" alt="loading" />
             <h2>Failed</h2>
             <p id="error_p_tag"></p>
             <button onclick="document.getElementById('failed_container').style.display = 'none'; ">Close</button>
        </div>
    </div>
</body>

<style>

<script>
    let db;
    initSqlJs({
        locateFile: file => `https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/${file}`
    }).then(SQL => {
        db = new SQL.Database();
        createDB();
        console.log("DB created.");
    });

    function error_render(message) {
       document.getElementById("error_p_tag").innerText = message;
       document.getElementById("failed_container").style.display = "flex";
    }

    let token = String("{{token}}");
    const protocol = window.location.protocol === "https:" ? "wss" : "ws";
    const websocket = new WebSocket(
       `${protocol}://${window.location.host}/ws?token=${token}`
    );

    function createDB() {
        db.run(`
            CREATE TABLE IF NOT EXISTS products_tbl (
                name TEXT,
                quantity INTEGER,
                price TEXT,
                link TEXT,
                description TEXT
            )
        `);
    }

    function write_data(products) {
        if (!db) {
            console.log("Error"); 
            document.getElementById("loading_container").style.display = "none";
            error_render("No database created") 
            return;
        }
        console.log("Write");
        db.run("DELETE FROM products_tbl");
        products.forEach(element => {
            db.run(
                "INSERT INTO products_tbl (name, quantity, price, link, description) VALUES (?,?,?,?,?)",
                [element[0], element[1], element[2], element[3], element[4]]
            );
        });
        renderProductList();
        document.getElementById("loading_container").style.display = "none";
    }

    function renderProductList() {
        const table = document.getElementById("product_details_table");
        const result = db.exec("SELECT name, quantity, price, link, description FROM products_tbl");
        const products = result.length ? result[0].values : [];

        // Add table header
        table.innerHTML = `
            <tr id="product_details_table_header">
                <td>Number</td>
                <td>Name</td>
                <td>Quantity</td>
                <td>Price</td>
                <td>Link</td>
                <td>Description</td>
            </tr>
        `;

        // Add rows
        products.forEach((element, index) => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td>${element[0]}</td>
                <td>${element[1]}</td>
                <td>${element[2]}</td>
                <td><a href="${element[3]}" target="_blank">View</a></td>
                <td>${element[4]}</td>
            `;
            tr.addEventListener("click", () => update_product_form(...element));
            table.appendChild(tr);
        });
    }

    function update_product_send(query) {
        document.getElementById("update_submit").disabled = true;
        let body;
        const product_name = document.getElementById("product_name_up").value;
        const product_description = document.getElementById("product_dsc_up").value;
        const product_img = document.getElementById("product_img_up").value;
        const product_qty = document.getElementById("product_qty_up").value;
        const product_price = document.getElementById("product_price_up").value;

        if (query == "insert") {
            let products = db.exec("SELECT name FROM products_tbl")[0].values;
            for (let i = 0; i < products.length; i++) {
                if (product_name.trim() == products[i][0]) {
                    alert(`Cannot add similar product name (${product_name})`);
                    return;
                }
            }
        }

        body = {
            "query": query,
            "product_name": product_name,
            "product_qty": product_qty,
            "product_description": product_description,
            "product_img": product_img,
            "product_price": product_price
        };

        sendWS(body);
    }

    function sendWS(payload) {
        if (websocket.readyState === WebSocket.OPEN) {
            websocket.send(JSON.stringify(payload));
        } else {
            error_render("WebSocket not connected. Please try again");
            console.error("WebSocket not connected.");
        }
        document.getElementById("update_submit").disabled = false;
    }

    websocket.onopen = () => {document.getElementById("loading_container").style.display = "flex"; console.log("WebSocket connected.")};
    websocket.onclose = () => {document.getElementById("loading_container").style.display = "flex"; alert("WebSocket disconnected.")};
    websocket.onerror = (error) => {error_render("Websocket Connection Error. Please try again."); console.error("WebSocket error:", error)};

    websocket.onmessage = function(event) {
        document.getElementById("screen").style.display = "none";
        document.getElementById("loading_container").style.display = "flex";
       setTimeout(() => {
        try {
            const data = JSON.parse(event.data);
            //if (data.message == "success") {console.log("Pass"); write_data(data.data)};
            write_data(data.data);
        } catch(err) {
            console.error(err);
            error_render("Error on updating data");
        }
       }, 1000);
    };

    function new_product_form() {
        document.getElementById("delete_button_pu").style.display = "none";
        document.getElementById("screen").style.display = "flex";

        document.getElementById("product_name_up").value = "";
        document.getElementById("product_qty_up").value = "";
        document.getElementById("product_price_up").value = "";
        document.getElementById("product_img_up").value = "";
        document.getElementById("product_dsc_up").value = "";

        document.getElementById("update_submit").onclick = () => update_product_send('insert');
    }

    function update_product_form(name, qty, price, link, description) {
        document.getElementById("delete_button_pu").style.display = "block";
        document.getElementById("screen").style.display = "flex";

        document.getElementById("update_submit").onclick = () => update_product_send('update');

        document.getElementById("product_name_up").value = name;
        document.getElementById("product_qty_up").value = qty;
        document.getElementById("product_price_up").value = price;
        document.getElementById("product_img_up").value = link;
        document.getElementById("product_dsc_up").value = description;
    }

    function close_form() {
        document.getElementById("screen").style.display = "none";
    }
</script>
</html>
